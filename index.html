<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0f19; color: #e2e8f0; }
        .chat-bubble { background-color: #1a202c; border-radius: 12px; padding: 12px 16px; margin: 8px 0; max-width: 80%; }
        .user-msg { background-color: #1e3a8a; margin-left: auto; }
        .input-box { background-color: #1a202c; border: 1px solid #2d3748; }
    </style>
</head>
<body class="h-screen flex flex-col p-6">
    <h1 class="text-xl font-bold text-gray-300 border-b border-gray-700 pb-2 mb-4">NEXUS AI PRO</h1>
    
    <div id="chatDisplay" class="flex-1 overflow-y-auto mb-4">
        <div class="chat-bubble">Hey! Nexus ready hai. Kya build karein aaj?</div>
    </div>

    <div class="input-box rounded-xl p-2 flex items-center gap-3">
        <input id="nexusInput" type="text" class="flex-1 bg-transparent outline-none p-2" placeholder="Enter prompt...">
        <button id="sendBtn" class="bg-blue-600 px-4 py-2 rounded-lg text-sm font-bold">SEND</button>
    </div>

    <script>
        const chatDisplay = document.getElementById('chatDisplay');
        const input = document.getElementById('nexusInput');
        const webhook = "https://eojia499pt81q60.m.pipedream.net";

        async function sendMessage() {
            const text = input.value.trim();
            if(!text) return;

            chatDisplay.innerHTML += `<div class="chat-bubble user-msg">${text}</div>`;
            input.value = "";

            try {
                const res = await fetch(webhook, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ prompt: text })
                });
                
                const data = await res.json();
                chatDisplay.innerHTML += `<div class="chat-bubble">${data.answer || "No response"}</div>`;
            } catch(e) {
                console.error("Error:", e);
                chatDisplay.innerHTML += `<div class="chat-bubble text-red-400">Error: Connection failed.</div>`;
            }
            chatDisplay.scrollTop = chatDisplay.scrollHeight;
        }

        document.getElementById('sendBtn').onclick = sendMessage;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .nexus-title { 
            background: linear-gradient(90deg, #d4af37, #000); 
            -webkit-background-clip: text; 
            color: transparent; 
            border-bottom: 2px solid #d4af37; 
            padding-bottom: 5px;
        }
        .chat-area { height: calc(100vh - 180px); overflow-y: auto; }
        .typing::after { content: '|'; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body class="flex flex-col h-screen p-4">

    <header class="p-6">
        <h1 class="nexus-title text-3xl font-black tracking-tighter">NEXUS AI PRO</h1>
    </header>

    <div id="chatDisplay" class="chat-area p-4 flex flex-col gap-4 max-w-2xl mx-auto w-full">
        <div class="glass p-4 rounded-2xl w-fit">Hey! Nexus ready hai. Kya build karein aaj?</div>
    </div>

    <div class="max-w-2xl mx-auto w-full glass p-2 rounded-2xl flex items-center mt-auto">
        <input id="nexusInput" class="w-full bg-transparent p-3 outline-none" placeholder="Enter your prompt...">
        <button id="sendBtn" class="bg-white text-black font-bold px-6 py-2 rounded-xl hover:bg-yellow-500 transition">SEND</button>
    </div>

    <script>
        const chatDisplay = document.getElementById('chatDisplay');
        const input = document.getElementById('nexusInput');
        const webhook = "https://eojia499pt81q60.m.pipedream.net";

        async function typeEffect(element, text) {
            let i = 0;
            element.classList.add('typing');
            function type() {
                if (i < text.length) {
                    element.innerHTML += text.charAt(i);
                    i++;
                    chatDisplay.scrollTop = chatDisplay.scrollHeight;
                    setTimeout(type, 20);
                } else {
                    element.classList.remove('typing');
                }
            }
            type();
        }

        async function sendMessage() {
            const text = input.value.trim();
            if(!text) return;

            chatDisplay.innerHTML += `<div class="bg-blue-600/20 p-4 rounded-2xl ml-auto w-fit">${text}</div>`;
            input.value = "";

            const aiDiv = document.createElement('div');
            aiDiv.className = "glass p-4 rounded-2xl w-fit";
            chatDisplay.appendChild(aiDiv);

            const res = await fetch(webhook, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ prompt: text })
            });
            const data = await res.json();
            const answer = data.text || "Nexus active hai!"; // Gemini response field check kar lena
            
            typeEffect(aiDiv, answer);
        }

        document.getElementById('sendBtn').addEventListener('click', sendMessage);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0f19; color: #e2e8f0; font-family: sans-serif; }
        .chat-bubble { background-color: #1a202c; border-radius: 12px; padding: 12px 16px; margin: 8px 0; max-width: 80%; width: fit-content; }
        .user-msg { background-color: #1e3a8a; margin-left: auto; }
        .input-box { background-color: #1a202c; border: 1px solid #2d3748; }
    </style>
</head>
<body class="h-screen flex flex-col p-4 md:p-8">

    <header class="mb-6">
        <h1 class="text-xl font-bold tracking-widest text-gray-300 border-b border-gray-700 pb-2 inline-block">NEXUS AI PRO</h1>
    </header>

    <div id="chatDisplay" class="flex-1 overflow-y-auto mb-4">
        <div class="chat-bubble">Hey! Nexus ready hai. Kya build karein aaj?</div>
    </div>

    <div class="input-box rounded-xl p-2 flex items-center gap-3">
        <button class="text-gray-400 hover:text-white px-2">+</button>
        <input id="nexusInput" type="text" class="flex-1 bg-transparent outline-none p-2" placeholder="Enter your prompt...">
        <button id="micBtn" class="text-gray-400 hover:text-white">🎤</button>
        <button id="sendBtn" class="bg-blue-600 px-4 py-2 rounded-lg text-sm font-bold hover:bg-blue-500 transition">SEND</button>
    </div>

    <script>
        const chatDisplay = document.getElementById('chatDisplay');
        const input = document.getElementById('nexusInput');
        const webhook = "[https://eojia499pt81q60.m.pipedream.net]"; // Yahan apna Pipedream URL daal

        async function sendMessage() {
            const text = input.value.trim();
            if(!text) return;

            // 1. UI mein user ka message add karo
            chatDisplay.innerHTML += `<div class="chat-bubble user-msg">${text}</div>`;
            input.value = "";
            chatDisplay.scrollTop = chatDisplay.scrollHeight;

            // 2. Pipedream ko request bhejo
            try {
                const res = await fetch(webhook, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ prompt: text })
                });

                // 3. Pipedream se response lo (JSON format)
                const data = await res.json(); 
                
                // 4. Pipedream mein jo key set ki thi (answer), wahi yahan use karo
                const botReply = data.answer || "Nexus ne response nahi diya."; 

                // 5. AI ka response UI mein dikhao
                const aiDiv = document.createElement('div');
                aiDiv.className = "chat-bubble";
                aiDiv.innerText = botReply;
                chatDisplay.appendChild(aiDiv);
                chatDisplay.scrollTop = chatDisplay.scrollHeight;

            } catch(e) {
                console.error(e);
                chatDisplay.innerHTML += `<div class="chat-bubble text-red-400">Error: Nexus backend connect nahi hua.</div>`;
            }
        }

        document.getElementById('sendBtn').addEventListener('click', sendMessage);
        input.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });
    </script>
</body>
</html>

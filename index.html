<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #050505; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .chat-box { width: 90%; max-width: 600px; background: #1a1a1a; border-radius: 20px; padding: 15px; border: 1px solid #333; }
        textarea { width: 100%; background: transparent; border: none; outline: none; color: white; font-size: 16px; min-height: 100px; resize: none; }
        .controls { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #333; padding-top: 10px; }
        button { background: #3b82f6; border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; }
        button:disabled { background: #555; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="chat-box">
    <textarea id="nexusInput" placeholder="Describe your masterpiece..."></textarea>
    <div class="controls">
        <span style="color: gray; font-size: 12px;">Nexus AI</span>
        <button id="sendBtn" disabled>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>
        </button>
    </div>
</div>

<script>
    const input = document.getElementById('nexusInput');
    const btn = document.getElementById('sendBtn');
    const url = "https://eojia499pt81q60.m.pipedream.net";

    input.addEventListener('input', () => btn.disabled = !input.value.trim());

    async function sendMsg() {
        if(!input.value.trim()) return;
        const oldVal = input.value;
        input.value = "Thinking...";
        input.disabled = btn.disabled = true;

        try {
            const res = await fetch(url, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ prompt: oldVal })
            });
            input.value = await res.text();
        } catch(e) { input.value = "Error!"; }
        finally { input.disabled = btn.disabled = false; }
    }

    btn.addEventListener('click', sendMsg);
    input.addEventListener('keydown', (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); } });
</script>

</body>
</html>

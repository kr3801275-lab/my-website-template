<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; color: white; font-family: 'Inter', sans-serif; }
        .chat-area { height: calc(100vh - 160px); overflow-y: auto; scroll-behavior: smooth; }
        .user-msg { background: linear-gradient(135deg, #3b82f6, #2563eb); align-self: flex-end; border-radius: 16px 16px 2px 16px; }
        .ai-msg { background: #1e293b; align-self: flex-start; border-radius: 16px 16px 16px 2px; border: 1px solid #334155; }
        
        /* Thinking Animation */
        .loader { width: 20px; height: 20px; border: 3px solid #FFF; border-bottom-color: transparent; border-radius: 50%; display: inline-block; animation: rotation 1s linear infinite; }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .chat-area::-webkit-scrollbar { width: 6px; }
        .chat-area::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

    <header class="p-4 border-b border-slate-800 bg-slate-900/50 backdrop-blur-md text-center font-bold text-xl tracking-wider">
        NEXUS AI <span class="text-blue-500">PRO</span>
    </header>

    <div id="chatDisplay" class="chat-area p-6 flex flex-col gap-6 max-w-3xl mx-auto w-full">
        <div class="ai-msg p-4 max-w-[80%] shadow-lg shadow-blue-900/10">Hey! Main Nexus hoon. Batao, aaj kya build karna hai? 🚀</div>
    </div>

    <div class="p-4 bg-slate-950">
        <div class="max-w-3xl mx-auto bg-slate-900 rounded-2xl border border-slate-700 p-2 flex items-center shadow-2xl focus-within:ring-2 focus-within:ring-blue-500/50">
            <textarea id="nexusInput" rows="1" class="w-full bg-transparent outline-none p-3 text-white placeholder-slate-500 resize-none" placeholder="Describe your app idea..."></textarea>
            <button id="sendBtn" class="bg-blue-600 p-3 rounded-xl hover:bg-blue-500 transition">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"></path></svg>
            </button>
        </div>
    </div>

    <script>
        const chatDisplay = document.getElementById('chatDisplay');
        const input = document.getElementById('nexusInput');
        const btn = document.getElementById('sendBtn');
        const webhook = "https://eojia499pt81q60.m.pipedream.net";

        function addMsg(text, type, isLoader = false) {
            const div = document.createElement('div');
            div.className = `p-4 max-w-[80%] ${type === 'user' ? 'user-msg ml-auto' : 'ai-msg'} animate-in fade-in zoom-in duration-300`;
            div.innerHTML = isLoader ? `<span class="loader"></span>` : text;
            chatDisplay.appendChild(div);
            chatDisplay.scrollTop = chatDisplay.scrollHeight;
            return div;
        }

        async function sendMessage() {
            const text = input.value.trim();
            if(!text) return;

            addMsg(text, 'user');
            input.value = "";
            const loaderDiv = addMsg('', 'ai', true);

            try {
                const res = await fetch(webhook, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ prompt: text })
                });
                const answer = await res.text();
                loaderDiv.innerHTML = answer.replace(/<\/?[^>]+(>|$)/g, "");
            } catch(e) {
                loaderDiv.innerHTML = "Error: Nexus response nahi de raha.";
            }
        }

        btn.addEventListener('click', sendMessage);
        input.addEventListener('keydown', (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
    </script>
</body>
</html>

<script>
    async function sendToNexus(event) {
        // Enter press karne par trigger hoga
        if (event.key === 'Enter' && !event.shiftKey) {
            event.preventDefault(); // Nayi line na bane
            const userInput = document.querySelector('textarea').value;
            const webhookUrl = "https://eojia499pt81q60.m.pipedream.net";

            if (!userInput) return;

            try {
                const response = await fetch(webhookUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: userInput })
                });
                if (response.ok) {
                    console.log("Nexus ko message mil gaya!");
                    document.querySelector('textarea').value = ""; // Text area saaf ho jayega
                }
            } catch (error) {
                console.error("Error:", error);
            }
        }
    }
    // Textarea mein event listener add kar do
    document.querySelector('textarea').addEventListener('keydown', sendToNexus);
</script>

<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: white; font-family: sans-serif; }
        .chatbox-wrapper {
            position: relative;
            background: #1a1a1a;
            border-radius: 16px;
            padding: 1px;
        }
        /* Yeh hai wo glowing lighting effect */
        .chatbox-wrapper::before {
            content: "";
            position: absolute;
            inset: -2px;
            border-radius: 18px;
            background: linear-gradient(90deg, #4285f4, #9b72cb, #d96570, #4285f4);
            z-index: -1;
            opacity: 0.8;
            filter: blur(2px);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">

    <h1 class="text-4xl font-bold mb-10 bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 to-pink-500">
        Nexus Pro
    </h1>
    
    <div class="w-full max-w-2xl chatbox-wrapper">
        <textarea id="nexusInput" class="w-full bg-[#1a1a1a] rounded-xl p-5 outline-none min-h-[140px] text-white" placeholder="Describe an app..."></textarea>
        <div class="flex justify-between items-center px-4 pb-3">
            <button class="text-gray-400 hover:text-white">📎 Attach</button>
            <!-- Tera naya Send Button -->
            <button id="sendBtn" class="bg-blue-600 hover:bg-blue-500 text-white rounded-full p-3 transition-all">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>
            </button>
        </div>
    </div>

    <script>
        const input = document.getElementById('nexusInput');
        const btn = document.getElementById('sendBtn');
        const webhook = "https://eojia499pt81q60.m.pipedream.net";

        async function sendMsg() {
            if(!input.value.trim()) return;
            const text = input.value;
            input.value = "Nexus is thinking...";
            
            try {
                const res = await fetch(webhook, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ prompt: text })
                });
                input.value = await res.text();
            } catch(e) { input.value = "Error!"; }
        }

        btn.addEventListener('click', sendMsg);
        input.addEventListener('keydown', (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); } });
    </script>
</body>
</html>

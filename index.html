<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .typing::after { content: '|'; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body class="bg-black text-white min-h-screen flex flex-col items-center justify-center transition-all duration-700 p-4" id="main-body">

    <div id="chat-container" class="w-full max-w-2xl bg-gray-900/50 border border-gray-800 rounded-2xl p-6 backdrop-blur-sm shadow-2xl">
        <h1 id="hero-text" class="text-3xl font-bold mb-6 text-center text-gray-400">Let's build something!</h1>
        
        <div id="chat-history" class="h-64 overflow-y-auto mb-4 space-y-4"></div>

        <div class="relative flex items-center">
            <input type="text" id="user-input" class="w-full bg-black border border-gray-700 rounded-full py-3 px-6 outline-none focus:border-blue-500" placeholder="Describe your website...">
            <input type="file" id="file-upload" class="hidden">
            <button onclick="document.getElementById('file-upload').click()" class="ml-3 text-2xl text-gray-500 hover:text-blue-400">+</button>
        </div>
    </div>

    <script>
        const input = document.getElementById('user-input');
        const container = document.getElementById('main-body');
        const history = document.getElementById('chat-history');

        input.addEventListener('keypress', async (e) => {
            if (e.key === 'Enter') {
                // Transition to bottom
                container.classList.remove('justify-center');
                container.classList.add('justify-end');
                document.getElementById('hero-text').classList.add('hidden');

                const prompt = input.value;
                input.value = '';
                
                // Add User Message
                history.innerHTML += `<div class="text-right text-blue-400">You: ${prompt}</div>`;

                // Fetch Backend
                try {
                    const response = await fetch('https://eojia499pt81q60.m.pipedream.net', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ prompt: prompt })
                    });
                    const data = await response.json();
                    
                    // AI Response with Typing Effect
                    const aiDiv = document.createElement('div');
                    aiDiv.className = "text-gray-300";
                    aiDiv.innerText = "Nexus: ";
                    history.appendChild(aiDiv);
                    
                    let text = data.answer;
                    for(let char of text) {
                        aiDiv.innerText += char;
                        await new Promise(r => setTimeout(r, 20));
                    }
                } catch (err) {
                    history.innerHTML += `<div class="text-red-500">Error connecting to Nexus.</div>`;
                }
            }
        });
    </script>
</body>
</html>

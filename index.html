<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus AI Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Golden Matte Gradient Outline Effect */
        .nexus-title {
            font-size: 1.5rem;
            font-weight: 800;
            padding: 10px 20px;
            border: 2px solid transparent;
            border-image: linear-gradient(to bottom right, #d4af37, #000000);
            border-image-slice: 1;
            color: #d4af37;
            display: inline-block;
            margin-bottom: 20px;
        }
        #chat-box { height: 60vh; overflow-y: auto; scroll-behavior: smooth; }
        .logo { width: 50px; height: 50px; border-radius: 50%; }
    </style>
</head>
<body class="bg-black text-white p-5">

    <!-- Header with Logo and Title -->
    <div class="flex items-center gap-4">
        <img src="https://orig00.deviantart.net/c34a/f/2016/045/e/0/nexus_logo_wallpaper_by_pauledwards03-d9rqmvx.png" alt="Logo" class="logo">
        <div class="nexus-title">NEXUS AI PRO</div>
    </div>

    <!-- Chat Area -->
    <div id="chat-box" class="border border-gray-800 p-4 rounded-lg bg-gray-900 mb-4"></div>

    <!-- Input Area -->
    <div class="flex gap-2">
        <input id="user-input" type="text" class="flex-1 p-3 bg-gray-800 rounded border border-gray-700 text-white focus:outline-none focus:border-yellow-600" placeholder="Ask Nexus anything...">
        <button onclick="sendMessage()" class="bg-yellow-700 hover:bg-yellow-600 px-6 py-2 rounded font-bold text-black transition">Send</button>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            if (!input.value) return;

            chatBox.innerHTML += `<div class="text-right text-gray-300 mb-3"><b>You:</b> ${input.value}</div>`;
            const userText = input.value;
            input.value = '';

            // API Call
            const response = await fetch('YOUR_PIPEDREAM_URL_HERE', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: userText })
            });
            const data = await response.json();
            
            // Get response text (Adjust path based on your API response)
            const botResponse = data.candidates[0].content.parts[0].text;
            
            const resDiv = document.createElement('div');
            resDiv.className = "text-left text-yellow-500 mb-4 font-mono";
            chatBox.appendChild(resDiv);
            
            // Typing Effect
            let i = 0;
            function type() {
                if (i < botResponse.length) {
                    resDiv.innerHTML += botResponse.charAt(i);
                    i++;
                    chatBox.scrollTop = chatBox.scrollHeight;
                    setTimeout(type, 20); 
                }
            }
            type();
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; color: white; font-family: 'Inter', sans-serif; }
        .chat-area { height: calc(100vh - 160px); overflow-y: auto; scroll-behavior: smooth; }
        .ai-msg { background: #1e293b; align-self: flex-start; border-radius: 16px 16px 16px 2px; border: 1px solid #334155; }
        
        /* Bouncing Dots Animation */
        .dot { width: 6px; height: 6px; background: white; border-radius: 50%; display: inline-block; animation: bounce 1.4s infinite ease-in-out both; }
        .dot1 { animation-delay: -0.32s; }
        .dot2 { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

    <header class="p-4 border-b border-slate-800 bg-slate-900/50 text-center font-bold text-xl tracking-wider">
        NEXUS AI <span class="text-blue-500">PRO</span>
    </header>

    <div id="chatDisplay" class="chat-area p-6 flex flex-col gap-6 max-w-3xl mx-auto w-full">
        <div class="ai-msg p-4 max-w-[80%]">Hey! Main Nexus hoon. Batao, aaj kya build karna hai? 🚀</div>
    </div>

    <div class="p-4 bg-slate-950">
        <div class="max-w-3xl mx-auto bg-slate-900 rounded-2xl border border-slate-700 p-2 flex items-center">
            <textarea id="nexusInput" rows="1" class="w-full bg-transparent outline-none p-3 text-white placeholder-slate-500 resize-none" placeholder="Describe your app idea..."></textarea>
            <button id="sendBtn" class="bg-blue-600 p-3 rounded-xl hover:bg-blue-500 transition">⬆️</button>
        </div>
    </div>

    <script>
        const chatDisplay = document.getElementById('chatDisplay');
        const input = document.getElementById('nexusInput');
        const btn = document.getElementById('sendBtn');
        const webhook = "https://eojia499pt81q60.m.pipedream.net";

        function addMsg(html, type) {
            const div = document.createElement('div');
            div.className = `p-4 max-w-[80%] ${type === 'user' ? 'bg-blue-600 ml-auto rounded-[16px_16px_4px_16px]' : 'ai-msg'}`;
            div.innerHTML = html;
            chatDisplay.appendChild(div);
            chatDisplay.scrollTop = chatDisplay.scrollHeight;
            return div;
        }

        async function sendMessage() {
            const text = input.value.trim();
            if(!text) return;

            addMsg(text, 'user');
            input.value = "";

            // "Thinking" state
            const thinkingDiv = addMsg('Nexus is thinking <span class="dot dot1"></span><span class="dot dot2"></span><span class="dot"></span>', 'ai');

            try {
                const res = await fetch(webhook, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ prompt: text })
                });
                const answer = await res.text();

                // 4 second ka wait
                setTimeout(() => {
                    thinkingDiv.innerHTML = answer.replace(/<\/?[^>]+(>|$)/g, "");
                }, 4000);
            } catch(e) {
                thinkingDiv.innerHTML = "Error: Nexus response nahi de raha.";
            }
        }

        btn.addEventListener('click', sendMessage);
    </script>
</body>
</html>

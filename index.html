<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: white; font-family: sans-serif; }
        .chat-container {
            width: 100%;
            max-width: 600px;
            background: #1a1a1a;
            border-radius: 16px;
            border: 1px solid #333;
            padding: 16px;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <h2 class="text-3xl font-bold mb-8 text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-pink-500">
        Nexus AI
    </h2>

    <div class="chat-container">
        <textarea 
            id="nexusInput" 
            class="w-full bg-transparent outline-none text-white min-h-[100px] mb-4" 
            placeholder="Describe your idea..."></textarea>
        
        <div class="flex justify-between items-center border-t border-gray-700 pt-3">
            <button class="text-gray-400 hover:text-white">📎 Attach</button>
            <button id="sendBtn" class="bg-indigo-600 px-5 py-2 rounded-lg hover:bg-indigo-500 transition">
                Generate
            </button>
        </div>
    </div>

    <script>
        const input = document.getElementById('nexusInput');
        const btn = document.getElementById('sendBtn');
        const webhook = "https://eojia499pt81q60.m.pipedream.net";

        async function processRequest() {
            if(!input.value.trim()) return;
            
            const originalText = input.value;
            input.value = "Thinking...";
            
            try {
                const res = await fetch(webhook, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: originalText })
                });
                const data = await res.text();
                input.value = data.replace(/<\/?[^>]+(>|$)/g, "");
            } catch (e) {
                input.value = "Error: Check Pipedream logs.";
            }
        }

        btn.addEventListener('click', processRequest);
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); processRequest(); }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: white; }
        .chat-layout { display: grid; grid-template-rows: 1fr auto; height: 100vh; padding: 20px; }
    </style>
</head>
<body>

    <div id="app" class="chat-layout max-w-5xl mx-auto">
        <div id="chat-history" class="flex flex-col space-y-6 overflow-y-auto p-4 scroll-smooth">
            <div id="hero-text" class="text-center mt-20">
                <h1 class="text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-500 to-purple-600">Let's build something!</h1>
            </div>
        </div>

        <div class="bg-gray-900/40 p-4 rounded-3xl border border-gray-800 flex items-center gap-4">
            <input type="text" id="user-input" class="w-full bg-transparent outline-none text-lg px-4" placeholder="Describe your website...">
            <button class="text-2xl text-gray-400 hover:text-white">+</button>
        </div>
    </div>

    <script>
        const input = document.getElementById('user-input');
        const history = document.getElementById('chat-history');

        input.addEventListener('keypress', async (e) => {
            if (e.key === 'Enter' && input.value.trim() !== "") {
                document.getElementById('hero-text').style.display = 'none';
                const prompt = input.value;
                input.value = '';
                
                history.innerHTML += `<div class="self-end bg-blue-600 p-3 rounded-xl max-w-md">${prompt}</div>`;

                const aiDiv = document.createElement('div');
                aiDiv.className = "self-start bg-gray-800 p-4 rounded-xl max-w-2xl text-gray-200";
                history.appendChild(aiDiv);

                // Instant Fetch
                const response = await fetch('https://eojia499pt81q60.m.pipedream.net', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: prompt })
                });
                const data = await response.json();
                
                // Fast Typing Effect
                const text = data.answer || "Nexus is ready to build.";
                for(let char of text) {
                    aiDiv.innerText += char;
                    await new Promise(r => setTimeout(r, 10)); // Instant speed
                }
            }
        });
    </script>
</body>
</html>

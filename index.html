<div class="w-full max-w-2xl chatbox-wrapper">
    <textarea 
        id="nexusInput" 
        class="w-full bg-[#1a1a1a] rounded-xl p-5 outline-none min-h-[140px] text-white" 
        placeholder="Describe your masterpiece..."></textarea>
    
    <div class="flex justify-between items-center px-4 pb-3">
        <button class="text-gray-400 hover:text-white transition">📎 Attach</button>
        
        <button 
            id="sendBtn" 
            class="bg-indigo-600 hover:bg-indigo-500 text-white rounded-full px-6 py-2 transition-all flex items-center gap-2">
            Generate 🚀
        </button>
    </div>
</div>

<script>
    const textarea = document.getElementById('nexusInput');
    const sendBtn = document.getElementById('sendBtn');
    const webhookUrl = "https://eojia499pt81q60.m.pipedream.net";

    async function sendPrompt() {
        const text = textarea.value.trim();
        if (!text) return;

        // UI Feedback
        textarea.value = "Nexus is processing...";
        textarea.disabled = true;
        sendBtn.disabled = true;

        try {
            const response = await fetch(webhookUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: text })
            });
            
            const result = await response.text();
            textarea.value = result.replace(/<\/?[^>]+(>|$)/g, ""); 
        } catch (err) {
            textarea.value = "Oops! Connection error with backend.";
        } finally {
            textarea.disabled = false;
            sendBtn.disabled = false;
        }
    }

    // Trigger on Button Click
    sendBtn.addEventListener('click', sendPrompt);

    // Trigger on 'Enter' key (Shift+Enter for newline)
    textarea.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendPrompt();
        }
    });
</script>

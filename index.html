<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .glow { box-shadow: 0 0 15px rgba(139, 92, 246, 0.3); }
    </style>
</head>
<body class="bg-gray-950 text-white min-h-screen flex flex-col">
    <!-- Navbar -->
    <nav class="flex justify-between items-center p-6">
        <h1 class="text-2xl font-bold tracking-tighter">NEXUS</h1>
        <button class="bg-indigo-600 px-4 py-2 rounded-lg hover:bg-indigo-500">Sign In</button>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow flex flex-col items-center justify-center p-4">
        <h2 class="text-4xl font-light mb-8">Build your ideas with Nexus</h2>
        
        <!-- Input Area -->
        <div class="w-full max-w-2xl glass rounded-xl p-4 glow">
            <textarea class="w-full bg-transparent outline-none p-2" placeholder="Describe an app and let Nexus do the rest"></textarea>
            <div class="flex justify-between items-center mt-4">
                <input type="file" id="docUpload" class="hidden" onchange="handleFileUpload(this)">
                <button onclick="document.getElementById('docUpload').click()" class="p-2 hover:text-indigo-400">📎</button>
                <button class="bg-indigo-600 px-6 py-2 rounded-full">Send</button>
            </div>
        </div>

        <!-- Payment Section -->
        <div class="mt-12 glass p-6 rounded-xl w-full max-w-md text-center">
            <h3 class="text-xl mb-4">Support Nexus (Only for India)</h3>
            <div class="border-2 border-dashed border-gray-600 p-4 mb-4 rounded-lg">
                <img src="YOUR_QR_CODE_IMAGE_URL" alt="UPI QR" class="mx-auto w-32 h-32">
            </div>
            <p class="text-sm text-gray-400 mb-2">nexus.platform@upi</p>
            <button onclick="copyUPI()" class="text-indigo-400 text-sm hover:underline">Copy UPI ID</button>
        </div>
    </main>

    <script>
        function handleFileUpload(input) { console.log("File selected:", input.files[0].name); }
        function copyUPI() { navigator.clipboard.writeText("nexus.platform@upi"); alert("UPI ID Copied!"); }
        // Backend Connect Function
        async function handleSendMessage(msg) { /* API Logic here */ }
    </script>
</body>
</html>

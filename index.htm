<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: white; display: flex; height: 100vh; overflow: hidden; margin: 0; }
        #sidebar { width: 80px; border-right: 1px solid #1f2937; display: flex; flex-direction: column; align-items: center; padding: 20px 0; background: #0a0a0a; }
        #chat-main { flex: 1; display: flex; flex-direction: column; height: 100vh; padding: 20px; }
        #chat-history { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .nexus-msg { background: #111; padding: 15px; border-radius: 12px; border: 1px solid #333; max-width: 80%; align-self: flex-start; }
        .user-msg { background: #2563eb; padding: 15px; border-radius: 12px; align-self: flex-end; max-width: 80%; color: white; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="w-12 h-12 bg-gradient-to-tr from-blue-500 to-purple-600 rounded-xl mb-10"></div>
        <div id="history-list" class="text-gray-500 text-xs text-center space-y-4"></div>
    </div>

    <div id="chat-main">
        <div id="chat-history">
            <div id="hero-text" class="text-center mt-20">
                <h1 class="text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-500 to-purple-600">Let's build something!</h1>
            </div>
        </div>

        <div class="bg-gray-900/50 p-4 rounded-3xl border border-gray-800 flex items-center gap-4 w-full max-w-4xl mx-auto">
            <input type="text" id="user-input" class="w-full bg-transparent outline-none text-white px-4 py-2" placeholder="Describe your website...">
            <button class="text-2xl text-gray-400 hover:text-white px-3">+</button>
        </div>
    </div>

    <script>
        const input = document.getElementById('user-input');
        const history = document.getElementById('chat-history');
        const hero = document.getElementById('hero-text');

        input.addEventListener('keypress', async (e) => {
            if (e.key === 'Enter' && input.value.trim() !== "") {
                hero.style.display = 'none';
                const prompt = input.value;
                input.value = '';
                
                // Add User Message
                history.innerHTML += `<div class="user-msg">${prompt}</div>`;

                // Add Loading AI Bubble
                const aiDiv = document.createElement('div');
                aiDiv.className = "nexus-msg";
                history.appendChild(aiDiv);

                try {
                    const response = await fetch('https://eojia499pt81q60.m.pipedream.net', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ prompt: prompt })
                    });
                    const data = await response.json();
                    
                    // Fast Typing Effect
                    const text = data.answer || "Nexus ready to build.";
                    for(let char of text) {
                        aiDiv.innerText += char;
                        await new Promise(r => setTimeout(r, 10));
                    }
                } catch (err) {
                    aiDiv.innerText = "Error: Backend unreachable. Check Pipedream.";
                }
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: white; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 80px; border-right: 1px solid #1f2937; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: space-between; }
        #main-chat { flex-grow: 1; display: flex; flex-direction: column; padding: 20px; }
        .chat-area { flex-grow: 1; overflow-y: auto; padding: 20px; }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <div id="sidebar">
        <div>
            <!-- Tumhara Logo (9:16 aspect ratio feel) -->
            <img src="YOUR_LOGO_URL" class="w-12 h-20 object-cover rounded-lg mb-8" alt="Nexus">
            <div id="chat-history" class="space-y-4 text-gray-500 text-xs">
                <!-- History Items -->
                <div class="cursor-pointer hover:text-white">Recent Build 01</div>
                <div class="cursor-pointer hover:text-white">Website UI v2</div>
            </div>
        </div>
    </div>

    <!-- Main Chat -->
    <div id="main-chat">
        <div id="chat-history-display" class="chat-area">
            <div id="hero-text" class="text-center mt-20">
                <h1 class="text-5xl font-bold text-gray-200">Let's build something!</h1>
            </div>
        </div>

        <!-- Input Box -->
        <div class="bg-gray-900/40 p-4 rounded-3xl border border-gray-800 flex items-center gap-4 mx-auto w-full max-w-4xl">
            <input type="text" id="user-input" class="w-full bg-transparent outline-none text-lg px-4" placeholder="Describe your website...">
            <button class="text-2xl text-gray-400 hover:text-white">+</button>
        </div>
    </div>

    <script>
        // Chat Logic
        const input = document.getElementById('user-input');
        const display = document.getElementById('chat-history-display');
        const hero = document.getElementById('hero-text');

        input.addEventListener('keypress', async (e) => {
            if (e.key === 'Enter' && input.value.trim() !== "") {
                hero.style.display = 'none';
                const prompt = input.value;
                input.value = '';
                
                // Add message to view
                display.innerHTML += `<div class="bg-gray-800 p-4 rounded-xl mb-4 max-w-2xl">${prompt}</div>`;

                // Fetch Backend
                const response = await fetch('https://eojia499pt81q60.m.pipedream.net', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: prompt })
                });
                const data = await response.json();
                
                // Display Response
                display.innerHTML += `<div class="text-blue-400 p-4">${data.answer}</div>`;
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: #e5e7eb; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 80px; border-right: 1px solid #1f2937; display: flex; flex-direction: column; align-items: center; padding: 20px 0; }
        #chat-main { flex: 1; display: flex; flex-direction: column; height: 100vh; }
        #chat-history { flex: 1; overflow-y: auto; padding: 40px; display: flex; flex-direction: column; gap: 20px; }
        .nexus-msg { background: #111; padding: 15px; border-radius: 12px; border: 1px solid #333; max-width: 80%; }
        .user-msg { background: #2563eb; padding: 15px; border-radius: 12px; align-self: flex-end; max-width: 80%; }
    </style>
</head>
<body>

    <div id="sidebar">
        <img src="YOUR_LOGO_URL" class="w-12 h-16 object-contain mb-10" alt="Nexus">
        <div id="history-list" class="text-gray-500 text-xs text-center space-y-4"></div>
    </div>

    <div id="chat-main">
        <div id="chat-history">
            <div id="welcome-text" class="text-center mt-20">
                <h1 class="text-5xl font-bold text-gray-500">Let's build something!</h1>
            </div>
        </div>

        <div class="p-6">
            <div class="bg-gray-900 border border-gray-700 rounded-2xl flex items-center px-6 py-4 max-w-4xl mx-auto">
                <input type="text" id="user-input" class="w-full bg-transparent outline-none text-white" placeholder="Describe your website structure...">
                <button class="text-gray-400 text-2xl">+</button>
            </div>
        </div>
    </div>

    <script>
        const input = document.getElementById('user-input');
        const history = document.getElementById('chat-history');
        const welcome = document.getElementById('welcome-text');

        input.addEventListener('keypress', async (e) => {
            if (e.key === 'Enter' && input.value.trim() !== "") {
                welcome.style.display = 'none';
                const prompt = input.value;
                input.value = '';

                history.innerHTML += `<div class="user-msg">${prompt}</div>`;
                const aiDiv = document.createElement('div');
                aiDiv.className = "nexus-msg";
                history.appendChild(aiDiv);

                try {
                    const res = await fetch('https://eojia499pt81q60.m.pipedream.net', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ prompt: prompt })
                    });
                    const data = await res.json();
                    const text = data.answer;
                    
                    // Fast Typing
                    for(let char of text) {
                        aiDiv.innerText += char;
                        await new Promise(r => setTimeout(r, 10));
                    }
                } catch(err) {
                    aiDiv.innerText = "Error: Nexus is offline.";
                }
            }
        });
    </script>
</body>
</html>
